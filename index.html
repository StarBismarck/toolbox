.login-screen::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.35)}
.login-logo{text-align:center;margin-bottom:16px}.login-logo .logo-title{font-size:26px;font-weight:700;color:var(--p)}.login-logo .logo-ver{font-size:12px;color:var(--ts);margin-top:2px}
.login-box{position:relative;z-index:1;background:#fff;border-radius:var(--r);padding:36px 28px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.15);text-align:center}
.login-box h2{margin-bottom:8px;font-size:22px}.login-box .sub{font-size:14px;color:var(--ts);margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border:2px solid var(--b);border-radius:var(--rs);font-size:15px;outline:none;margin-bottom:12px}
.login-box input:focus{border-color:var(--p)}.login-box .btn{width:100%;padding:12px;font-size:16px}
.login-box .err{color:var(--err);font-size:13px;margin-top:8px;min-height:20px}

.app-shell{display:none}.app-shell.show{display:flex;flex-direction:column;height:100vh}
/* Top Bar */
.topbar{background:var(--p);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:100;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.topbar h1{font-size:17px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-icon{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:6px;border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative}
.btn-icon:hover{background:rgba(255,255,255,.15)}.btn-icon.hide{display:none}
.badge{position:absolute;top:2px;right:2px;background:var(--err);color:#fff;font-size:9px;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;display:none}
.badge.show{display:flex}

/* Body */
.body-wrap{flex:1;display:flex;overflow:hidden}
/* Sidebar - always visible, framed */
.sidebar{width:210px;flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column;padding:4px}
.sidebar-card{background:var(--card);border-radius:var(--r);padding:12px;margin-bottom:8px;box-shadow:var(--sh)}
.sidebar-card h3{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.f-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--rs);cursor:pointer;transition:.2s;margin-bottom:2px}
.f-item:hover{background:#f1f5f9}.f-item .fav{font-size:18px;flex-shrink:0}.f-item .fn{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.f-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.f-dot.on{background:var(--on)}.f-dot.busy{background:var(--busy)}.f-dot.off{background:var(--off)}

/* Main */
.main-area{flex:1;min-width:0;overflow-y:auto}
.page{display:none;padding:12px;max-width:700px;margin:0 auto}
.page.active{display:block;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Right Panel - always visible, framed */
.right-panel{width:230px;flex-shrink:0;overflow-y:auto;padding:4px}
.rp-card{background:var(--card);border-radius:var(--r);padding:12px;margin-bottom:8px;box-shadow:var(--sh)}
.rp-card h3{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.lb-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--b)}.lb-item:last-child{border-bottom:none}
.lb-av{font-size:22px;flex-shrink:0}.lb-info{flex:1;min-width:0}.lb-name{font-size:13px;font-weight:500}.lb-stat{font-size:11px;color:var(--ts)}
.lb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}.lb-dot.on{background:var(--on)}.lb-dot.busy{background:var(--busy)}.lb-dot.off{background:var(--off)}

.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tool-card{background:var(--card);border-radius:var(--r);padding:16px 10px;box-shadow:var(--sh);cursor:pointer;text-align:center;transition:.3s;border:2px solid transparent;user-select:none;-webkit-tap-highlight-color:transparent}
.tool-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.12)}.tool-card:active{transform:scale(.96)}
.tool-card .icon{font-size:30px;display:block;margin-bottom:4px}.tool-card .label{font-size:13px;font-weight:600}.tool-card .desc{font-size:11px;color:var(--ts);margin-top:2px}

.sect{font-size:18px;font-weight:600;margin-bottom:10px}
.row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.row input,.row select{flex:1;min-width:100px;padding:10px 14px;border:2px solid var(--b);border-radius:var(--rs);font-size:15px;outline:none}
.row input:focus{border-color:var(--p)}.row input[type=number]{width:70px;flex:none}
.btn{padding:10px 20px;border:none;border-radius:var(--rs);font-size:15px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:.3s}
.btn:active{transform:scale(.96)}.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pl)}
.btn-d{background:var(--err);color:#fff}.btn-o{background:transparent;border:2px solid var(--b);color:var(--t)}.btn-o:hover{border-color:var(--p);color:var(--p)}
.btn-sm{padding:6px 14px;font-size:13px}.btn-xs{padding:4px 10px;font-size:12px}.btn-g{background:var(--on);color:#fff}

.tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.tag{background:#eef2ff;color:var(--p);padding:6px 14px;border-radius:20px;font-size:14px;display:flex;align-items:center;gap:6px}
.tag .rm{cursor:pointer;font-weight:bold;opacity:.6;font-size:16px}.tag .rm:hover{opacity:1}
.res-box{background:linear-gradient(135deg,#eef2ff,#f5f3ff);border-radius:var(--r);padding:28px 16px;text-align:center;margin:12px 0;min-height:60px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}
.res-box .big{font-size:26px;font-weight:700;color:var(--p)}.res-box .lbl{font-size:13px;color:var(--ts)}
.empty{text-align:center;padding:36px 20px;color:var(--ts)}.empty .icon{font-size:44px;margin-bottom:10px;display:block}
.canvas-wrap{display:flex;justify-content:center;margin:12px 0}.canvas-wrap canvas{width:100%;height:auto;max-width:300px;border-radius:var(--r);box-shadow:var(--sh)}
.li{background:var(--card);border-radius:var(--rs);padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;gap:8px}
.li .ct{flex:1}.li .t{font-weight:500;font-size:15px}.li .st{font-size:12px;color:var(--ts);margin-top:2px}.li .act{display:flex;gap:6px;flex-shrink:0}
.poll-opt{background:var(--card);border-radius:var(--rs);padding:12px 16px;margin-bottom:8px;border:2px solid var(--b);cursor:pointer;position:relative;overflow:hidden}
.poll-opt:hover{border-color:var(--pl)}.poll-opt .bar{position:absolute;left:0;top:0;bottom:0;background:rgba(99,102,241,.1);transition:width .5s;border-radius:var(--rs)}.poll-opt .txt{position:relative;z-index:1;display:flex;justify-content:space-between}.poll-opt .pct{font-weight:600;color:var(--p)}
.date-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:16px}.date-nav .dl{font-size:17px;font-weight:600;min-width:140px;text-align:center}
.duty-card{background:var(--card);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--sh);border-left:4px solid var(--p)}.duty-card .pr{font-size:17px;font-weight:600}.duty-card .pj{font-size:14px;color:var(--ts);margin-top:4px}
.bt-next{background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--sh);text-align:center;border:2px solid #f59e0b}
.bt-next .hint{font-size:13px;color:#92400e;margin-bottom:6px}.bt-next .name{font-size:24px;font-weight:700;color:#b45309}
.bt-row{background:var(--card);border-radius:var(--rs);padding:12px 16px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;gap:8px}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin:12px 0}
.emoji-opt{font-size:26px;padding:8px;text-align:center;cursor:pointer;border-radius:var(--rs);border:2px solid transparent}.emoji-opt:hover{background:#eef2ff}.emoji-opt.sel{border-color:var(--p);background:#eef2ff}
.st-btn{flex:1;min-width:80px;text-align:center;padding:10px;border-radius:var(--rs);border:2px solid var(--b);cursor:pointer;font-size:14px;background:#fff}
.st-btn.sel-on{border-color:var(--on);background:#d1fae5}.st-btn.sel-busy{border-color:var(--busy);background:#fef3c7}.st-btn.sel-away{border-color:#f97316;background:#ffedd5}.st-btn.sel-off{border-color:var(--off);background:#f1f5f9}
.stat-card{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--sh);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}.stat-card .lbl{font-size:13px;color:var(--ts)}.stat-card .val{font-size:28px;font-weight:700;color:var(--p)}
.proj-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}.proj-row input{flex:1;min-width:80px;padding:8px 10px;border:2px solid var(--b);border-radius:var(--rs);font-size:14px;outline:none}.proj-row input:focus{border-color:var(--p)}.proj-row input.narrow{width:60px;flex:none}
.diag-ok{color:var(--on)}.diag-err{color:var(--err)}
.inbox-item{background:var(--card);border-radius:var(--rs);padding:12px 16px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);border-left:3px solid var(--p)}.inbox-item.unread{border-left-color:var(--err)}
.inbox-item .from{font-size:12px;color:var(--ts)}.inbox-item .msg{font-size:14px;margin:4px 0}.inbox-item .time{font-size:11px;color:var(--ts)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e293b;color:#fff;padding:12px 24px;border-radius:var(--rs);font-size:14px;opacity:0;transition:.3s;z-index:999;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.menu-overlay{display:none;position:fixed;top:48px;left:10px;z-index:200;background:var(--card);border-radius:var(--rs);box-shadow:0 8px 30px rgba(0,0,0,.15);min-width:160px;overflow:hidden}.menu-overlay.show{display:block}
.menu-overlay div{padding:12px 16px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:8px}.menu-overlay div:hover{background:#f1f5f9}

@media(max-width:900px){.sidebar{width:180px}.right-panel{width:200px}}
@media(max-width:768px){
  .body-wrap{flex-direction:column}

<body>

<div class="login-screen" id="ls"><div class="login-box">

<div class="app-shell" id="app">
<header class="topbar">

</header>
<div class="menu-overlay" id="menuOverlay">
  <div onclick="App.toggleMenu();Router.go('home')">&#x1F3E0; 主页</div>
  <div onclick="App.toggleMenu();Router.go('inbox')">&#x1F4E8; 收件箱</div>
  <div onclick="App.toggleMenu();Router.go('profile')">&#x1F464; 个人中心</div>
  <div onclick="App.toggleMenu();Router.go('changelog')">&#x1F4CB; 更新公告</div>
  <div onclick="App.toggleMenu();App.quickStatus('online')">&#x1F7E2; 设为在线</div>
  <div onclick="App.toggleMenu();App.quickStatus('busy')">&#x1F7E1; 设为忙碌</div>

<div class="body-wrap">
  <div class="sidebar" id="sidebar"><div class="sidebar-card"><h3>👥 好友</h3><div id="sidebarFriends"></div></div></div>

  </div>
  <div class="right-panel" id="rightPanel">
    <div class="rp-card" id="leaderboardCard"><h3>🏆 在线排行榜</h3><div id="lbList"></div></div>
    <div class="rp-card" id="chatCard" style="display:none;flex:1;display:flex;flex-direction:column">
      <h3>💬 <span id="chatFriendName"></span> <span style="cursor:pointer;margin-left:auto;font-size:16px" onclick="Chat.close()">✕</span></h3>
      <div id="chatMsgs" style="flex:1;overflow-y:auto;max-height:300px;margin-bottom:8px"></div>
      <div style="display:flex;gap:4px"><input type="text" id="chatInput" placeholder="输入消息..." style="flex:1;padding:8px;border:1px solid var(--b);border-radius:8px;font-size:13px;outline:none" onkeydown="if(event.key==='Enter')Chat.send()"/><button class="btn btn-p btn-xs" onclick="Chat.send()">发送</button></div>
    </div>

<script>
var $=function(id){return document.getElementById(id)};
var H=function(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML};

// Version & Changelog
var VERSION='v2.1';
var WECHAT_OAUTH_URL='https://pswiejbqdsvdajzzisgj.supabase.co/functions/v1/wechat-auth';

  {v:'v2.0',date:'2026-06-18',items:['全新UI：蓝顶栏+三栏布局','收件箱系统：反馈+好友申请','好友申请需对方同意','头像上传：自动压缩至60x60','30秒心跳保持在线状态','☰快捷菜单','返回键简化：一键回首页','移动端适配']},
  {v:'v1.0',date:'2026-06-18',items:['三队百宝箱上线','多用户注册/登录','云端自动同步(Supabase)','小值轮换·多重项目配置','公差轮换·次数统计','幸运转盘·抽签','备忘录·集体投票','个人中心·好友系统']}
];

var API={URL:'https://pswiejbqdsvdajzzisgj.supabase.co',KEY:'sb_publishable_OcLstUOCgADmmQHZwjHEAg_TfGg_1fw',
  _h:function(ct){var h={'apikey':API.KEY,'Authorization':'Bearer '+API.KEY};if(ct)h['Content-Type']='application/json';return h;},
  get:async function(t,q){var r=await fetch(API.URL+'/rest/v1/'+t+(q?'?'+q:''),{headers:API._h()});if(!r.ok)throw new Error('GET '+r.status);return r.json();},
  post:async function(t,b){var r=await fetch(API.URL+'/rest/v1/'+t,{method:'POST',headers:Object.assign({'Prefer':'return=minimal'},API._h(true)),body:JSON.stringify(b)});if(!r.ok)throw new Error('POST '+r.status);},
  del:async function(t,q){var r=await fetch(API.URL+'/rest/v1/'+t+'?'+q,{method:'DELETE',headers:API._h()});if(!r.ok)throw new Error('DEL '+r.status);},
  upsert:async function(t,q,b){try{await API.del(t,q)}catch(e){};await API.post(t,b);},
  check:async function(){var r=[];try{await API.get('toolbar_data','limit=1');r.push({name:'数据库连接',ok:true});}catch(e){r.push({name:'数据库连接',ok:false,err:e.message});}try{localStorage.setItem('_dt','1');localStorage.removeItem('_dt');r.push({name:'本地存储',ok:true});}catch(e){r.push({name:'本地存储',ok:false,err:e.message});}r.push({name:'用户数',ok:true,info:Auth.users().length});return r;}};

var Store={_k:function(k){return'tb_'+(App.user||'')+'_'+k;},
  get:function(k,fb){try{var v=localStorage.getItem(Store._k(k));return v!=null?JSON.parse(v):(fb!==undefined?fb:null);}catch(e){return fb!==undefined?fb:null;}},
  set:function(k,v){localStorage.setItem(Store._k(k),JSON.stringify(v));Store._sync(k,v);},
  getRaw:function(k){return localStorage.getItem(k);},setRaw:function(k,v){localStorage.setItem(k,v);},
  _sync:function(k,v){if(!App.user)return;var u=App.user,b={username:u,data_type:k,data_json:JSON.stringify(v),updated_at:new Date().toISOString()};API.upsert('toolbar_data','username=eq.'+encodeURIComponent(u)+'&data_type=eq.'+encodeURIComponent(k),b).catch(function(){});},
  syncUsers:function(){API.upsert('toolbar_data','username=eq._system&data_type=eq._users',{username:'_system',data_type:'_users',data_json:JSON.stringify(Auth.users()),updated_at:new Date().toISOString()}).catch(function(){});},
  pull:async function(){if(!App.user)return;try{var rows=await API.get('toolbar_data','username=eq.'+encodeURIComponent(App.user));var h=false;for(var i=0;i<rows.length;i++){if(rows[i].data_type&&rows[i].data_type!=='_users'&&rows[i].data_type!=='_inbox'&&rows[i].data_json){localStorage.setItem(Store._k(rows[i].data_type),rows[i].data_json);h=true;}}if(h){toast('已同步');var c=Router._current,cfg=Router._routes[c];if(cfg&&cfg.onEnter)cfg.onEnter();}var inboxRow=rows.find(function(r){return r.data_type==='_inbox'});if(inboxRow&&inboxRow.data_json){localStorage.setItem(Store._k('_inbox'),inboxRow.data_json);App.updateInboxBadge();}}catch(e){}},
  pullUsers:async function(){try{var rows=await API.get('toolbar_data','username=eq._system&data_type=eq._users');if(rows.length&&rows[0].data_json){var cu=JSON.parse(rows[0].data_json),lu=Auth.users();for(var i=0;i<cu.length;i++){var existing=lu.find(function(u){return u.username===cu[i].username});if(!existing)lu.push(cu[i]);else{existing.avatar=cu[i].avatar||existing.avatar;existing.friends=cu[i].friends||existing.friends;}}Auth._saveNoSync(lu);}}catch(e){}}};

var Router={_routes:{},_history:[],_current:'home',
  register:function(n,c){Router._routes[n]=c;},
  go:function(n){Router._history=[];var p=Router._current;if(p===n&&n!=='home')return;var c=Router._routes[n];if(!c)return;var ps=document.querySelectorAll('.page');for(var i=0;i<ps.length;i++)ps[i].classList.remove('active');var pid='page'+n.charAt(0).toUpperCase()+n.slice(1),pg=$(pid);if(!pg){pg=document.createElement('div');pg.id=pid;pg.className='page';if(c.html)pg.innerHTML=c.html;$('mainArea').appendChild(pg);}pg.classList.add('active');$('ht').textContent=c.title||n;$('bb').classList.toggle('hide',n==='home');Router._current=n;history.replaceState({page:n},'','#'+n);if(c.onEnter)c.onEnter();$('menuOverlay').classList.remove('show');if(n==='home'){Render.lb();App.renderSidebar();}},
  back:function(){Router.go('home');},
  init:function(){var s=this;window.addEventListener('popstate',function(e){Router.go('home');});var h=location.hash.replace('#','');if(h&&Router._routes[h]){Router.go(h);}}
};

var Auth={
  isReg:false,init:function(){Auth._ensureAdmin();Store.pullUsers().then(function(){if(sessionStorage.getItem('tb_s')){App.login(sessionStorage.getItem('tb_s'));return;}var p=new URLSearchParams(location.search);var wt=p.get('wx_token');if(wt){Auth._handleWechatToken(wt);return;}$('ls').style.display='flex';if(!Store.getRaw('tb_users'))Auth._setReg();});},
  _ensureAdmin:function(){if(!Store.getRaw('tb_users')){crypto.subtle.digest('SHA-256',new TextEncoder().encode('12345'+'tb_salt')).then(function(h){var hash=Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');Store.setRaw('tb_users',JSON.stringify([{id:0,username:'admin',passwordHash:hash,createdAt:'',avatar:'👑',status:'offline',role:'admin',friends:[],lastSeen:null}]));});}},
  _setReg:function(){Auth.isReg=true;$('lt').textContent='📝 注册';$('lst').textContent='创建新账号';$('lb').textContent='注册';$('ltg').textContent='已有账号？';$('ltl').textContent='登录';$('lp2').style.display='block';$('le').textContent='';},
  _setLogin:function(){Auth.isReg=false;$('lt').textContent='🔐 登录';$('lst').textContent='请输入账号密码';$('lb').textContent='登录';$('ltg').textContent='没有账号？';$('ltl').textContent='注册';$('lp2').style.display='none';$('le').textContent='';},
  toggle:function(){Auth.isReg?Auth._setLogin():Auth._setReg();},
  users:function(){try{return JSON.parse(Store.getRaw('tb_users'))||[]}catch(e){return[]}},
  saveUsers:function(u){Store.setRaw('tb_users',JSON.stringify(u));Store.syncUsers();App.renderSidebar();Render.lb();},
  _saveNoSync:function(u){Store.setRaw('tb_users',JSON.stringify(u));},
  hash:async function(p){var d=new TextEncoder().encode(p+'tb_salt');var h=await crypto.subtle.digest('SHA-256',d);return Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');},
  login:async function(){var un=$('lu').value.trim(),pw=$('lp').value,pw2=$('lp2').value,er=$('le');if(!un){er.textContent='请输入用户名';return}if(un.length<2){er.textContent='用户名至少2字';return}if(pw.length<4){er.textContent='密码至少4位';return}var us=Auth.users();if(Auth.isReg){if(pw!==pw2){er.textContent='两次密码不一致';return}if(us.some(function(u){return u.username===un})){er.textContent='该用户名已存在';return}us.push({id:Date.now(),username:un,passwordHash:await Auth.hash(pw),createdAt:new Date().toLocaleString('zh-CN'),avatar:'',status:'online',role:'user',friends:[],lastSeen:new Date().toLocaleString('zh-CN')});Auth.saveUsers(us);sessionStorage.setItem('tb_s',un);App.login(un);toast('注册成功，欢迎 '+un+'!');}else{var f=us.find(function(u){return u.username===un});if(!f){er.textContent='用户不存在';return}if(await Auth.hash(pw)!==f.passwordHash){er.textContent='密码错误';$('lp').value='';return}f.status='online';f.lastSeen=new Date().toLocaleString('zh-CN');Auth.saveUsers(us);sessionStorage.setItem('tb_s',un);App.login(un);}},
  logout:function(){App.stopHeartbeat();var us=Auth.users(),un=App.user;var f=us.find(function(u){return u.username===un});if(f){f.status='offline';Auth.saveUsers(us);}sessionStorage.removeItem('tb_s');App.user=null;$('ls').style.display='flex';$('app').classList.remove('show');$('lu').value='';$('lp').value='';$('lp2').value='';Auth._setLogin();},
  wechatLogin:function(){location.href=WECHAT_OAUTH_URL;},
  _handleWechatToken:async function(token){try{var parts=atob(token).split(':');var username=parts[0];if(!username){$('ls').style.display='flex';return}var us=Auth.users();var f=us.find(function(u){return u.username===username});if(!f){toast('微信用户未同步');$('ls').style.display='flex';return}sessionStorage.setItem('tb_s',username);App.login(username);history.replaceState({},'','/toolbox');}catch(e){$('ls').style.display='flex';}}
};

var App={
  user:null,heartbeatId:null,
  login:function(un){App.user=un;$('ls').style.display='none';$('app').classList.add('show');var u=Auth.users().find(function(x){return x.username===un});if(u){$('av').textContent=u.avatar||'👤';$('adBtn').style.display=(u.role==='admin'?'flex':'none');}App.startHeartbeat();App._buildHome();Router.register('home',{title:'三队百宝箱',onEnter:function(){Render.lb();App.renderSidebar();}});Router.init();Router.go('home');Store.pull();App.renderSidebar();Render.lb();App.updateInboxBadge();App.checkVersion();},
  _buildHome:function(){var g=$('homeGrid');g.innerHTML='';Tools.list.forEach(function(t){if(t.id==='admin')return;g.innerHTML+='<div class="tool-card" onclick="Router.go(\''+t.id+'\')"><span class="icon">'+t.icon+'</span><span class="label">'+t.name+'</span><span class="desc">'+t.desc+'</span></div>';});},
  toggleMenu:function(){$('menuOverlay').classList.toggle('show');},
  quickStatus:function(st){TPR.setS(st);},
  renderSidebar:function(){var u=Auth.users().find(function(x){return x.username===App.user});if(!u)return;var fs=u.friends||[],us=Auth.users();var sf=$('sidebarFriends');if(!fs.length){sf.innerHTML='<div style="color:var(--ts);font-size:12px;text-align:center;padding:10px">暂无好友<br>去个人中心添加</div>';return;}var online=[],offline=[];fs.forEach(function(fn){var fu=us.find(function(x){return x.username===fn});if(fu&&(fu.status==='online'||fu.status==='busy'||fu.status==='away'))online.push(fu);else offline.push(fn||{username:fn,avatar:'👤'});});var ri=function(u,st){return'<div class="f-item" onclick="Chat.open(\''+u.username+'\')"><div class="fav">'+(u.avatar||'👤')+'</div><div class="fn">'+H(u.username)+'</div><div class="f-dot '+st+'"></div></div>';};sf.innerHTML='<div style="font-size:11px;color:var(--ts);margin-bottom:4px">在线 ('+online.length+')</div>'+online.map(function(fu){return ri(fu,fu.status==='busy'?'busy':fu.status==='away'?'busy':'on');}).join('')+'<div style="font-size:11px;color:var(--ts);margin:8px 0 4px">离线 ('+offline.length+')</div>'+offline.map(function(fu){return ri(fu,'off');}).join('');},
  startHeartbeat:function(){App.stopHeartbeat();App._beat();App.heartbeatId=setInterval(function(){App._beat();},30000);},
  _beat:function(){if(!App.user)return;var us=Auth.users();var f=us.find(function(u){return u.username===App.user});if(f&&f.status!=='offline'){sessionStorage.setItem('tb_hb',Date.now().toString());}},
  stopHeartbeat:function(){if(App.heartbeatId){clearInterval(App.heartbeatId);App.heartbeatId=null;}},
  updateInboxBadge:function(){var ib=Store.get('_inbox',[]);var unread=ib.filter(function(m){return !m.read}).length;var b=$('inboxBadge');if(unread>0){b.textContent=unread;b.classList.add('show');}else{b.classList.remove('show');}},
  checkVersion:function(){var lv=localStorage.getItem('tb_version');if(lv!==VERSION){toast('欢迎使用 '+VERSION+'！查看☰菜单→更新公告');localStorage.setItem('tb_version',VERSION);}}
};

var Inbox={
  add:function(type,from,to,msg){var ib=JSON.parse(localStorage.getItem('tb_'+to+'_inbox')||'[]');ib.unshift({id:Date.now(),type:type,from:from,msg:msg,time:new Date().toLocaleString('zh-CN'),read:false});localStorage.setItem('tb_'+to+'_inbox',JSON.stringify(ib));API.upsert('toolbar_data','username=eq.'+encodeURIComponent(to)+'&data_type=eq._inbox',{username:to,data_type:'_inbox',data_json:JSON.stringify(ib),updated_at:new Date().toISOString()}).catch(function(){});},
  markRead:function(id){var ib=Store.get('_inbox',[]);for(var i=0;i<ib.length;i++){if(ib[i].id===id){ib[i].read=true;break;}}Store.set('_inbox',ib);App.updateInboxBadge();},
  acceptFriend:function(id,from){Inbox.markRead(id);var us=Auth.users();var me=us.find(function(u){return u.username===App.user});var them=us.find(function(u){return u.username===from});if(!me.friends)me.friends=[];if(me.friends.indexOf(from)<0)me.friends.push(from);if(them&&them.friends&&them.friends.indexOf(App.user)<0)them.friends.push(App.user);Auth.saveUsers(us);toast('已添加好友: '+from);},
  declineFriend:function(id){Inbox.markRead(id);}
};

(function(){Tools.register({id:'inbox',name:'收件箱',icon:'📨',desc:'',html:'<p class="sect">📨 收件箱</p><div id="inboxList"></div>',onEnter:function(){rdr();}});function rdr(){var ib=Store.get('_inbox',[]);var c=$('inboxList');if(!ib.length){c.innerHTML='<div class="empty"><span class="icon">📨</span>收件箱是空的</div>';return;}c.innerHTML=ib.map(function(m){var cls=m.read?'':'unread';var actions='';if(m.type==='friend_request'){actions='<div style="display:flex;gap:6px;margin-top:6px"><button class="btn btn-g btn-xs" onclick="Inbox.acceptFriend('+m.id+',\''+m.from+'\')">✅ 同意</button><button class="btn btn-d btn-xs" onclick="Inbox.declineFriend('+m.id+')">❌ 拒绝</button></div>';}else{actions='<div style="margin-top:4px"><button class="btn btn-o btn-xs" onclick="Inbox.markRead('+m.id+')">✓ 已读</button></div>';}return'<div class="inbox-item '+cls+'"><div class="from">'+(m.type==='friend_request'?'🤝 好友申请':'💬 反馈')+' · 来自: '+H(m.from)+'</div><div class="msg">'+H(m.msg)+'</div><div class="time">'+m.time+'</div>'+actions+'</div>';}).join('');}})();

(function(){var EM=['👤','🧑','👩','👨','🧔','🧓','👻','🤖','👽','👾','🐶','🐱','🐯','🐰','🐹','🦁','🐵','🐒','🦄','🐌','🌸','🌺','🌻','🌴','🌍','🌞','⭐','❤️','💜','💙','💚','💛'];var ST=[{k:'online',l:'🟢 在线',c:'sel-on'},{k:'busy',l:'🟡 忙碌',c:'sel-busy'},{k:'away',l:'🟠 离开',c:'sel-away'},{k:'offline',l:'⚪ 隐身',c:'sel-off'}];Tools.register({id:'profile',name:'个人中心',icon:'👤',desc:'',html:'<p class="sect">👤 个人中心</p><div style="text-align:center;margin-bottom:16px"><div style="font-size:64px;cursor:pointer" id="pav">👤</div><p style="font-weight:600;font-size:18px;margin-top:4px" id="pun"></p></div><p style="font-size:14px;font-weight:600;margin-bottom:6px">上传头像 <span style="font-size:11px;color:var(--ts)">(自动压缩,最大2KB)</span></p><div class="row"><input type="file" id="pfile" accept="image/*" style="font-size:13px" onchange="TPR.upload()"/></div><p style="font-size:14px;font-weight:600;margin:8px 0 6px">或选择表情头像</p><div class="emoji-grid" id="pem"></div><p style="font-size:14px;font-weight:600;margin:12px 0 6px">在线状态</p><div class="row" id="pst" style="flex-wrap:nowrap"></div><p style="font-size:14px;font-weight:600;margin:16px 0 6px">👥 好友列表</p><div class="row"><input type="text" id="pfi" placeholder="输入好友用户名"/><button class="btn btn-p btn-sm" onclick="TPR.addF()">添加好友</button></div><div id="pfl"></div>',onEnter:function(){rdr();}});window.TPR={upload:function(){var f=$('pfile').files[0];if(!f)return;if(f.size>500000){toast('图片不能超过500KB');return}var reader=new FileReader();reader.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement('canvas');var s=60;c.width=s;c.height=s;var ctx=c.getContext('2d');ctx.drawImage(img,0,0,s,s);var b64=c.toDataURL('image/jpeg',0.3);if(b64.length>4000){toast('压缩后仍太大('+Math.round(b64.length/1024)+'KB)');return}var us=Auth.users();var fu=us.find(function(u){return u.username===App.user});if(fu){fu.avatar=b64;Auth.saveUsers(us);$('av').innerHTML='<span style=font-size:14px>🖼</span>';$('pav').style.backgroundImage='url('+b64+')';$('pav').style.backgroundSize='cover';$('pav').textContent='';$('pfile').value='';rdr();toast('头像已更新');}};img.onerror=function(){toast('图片加载失败');};img.src=e.target.result;};reader.onerror=function(){toast('文件读取失败');};reader.readAsDataURL(f);},setA:function(e){var us=Auth.users();var f=us.find(function(u){return u.username===App.user});if(f){f.avatar=e;Auth.saveUsers(us);$('av').textContent=e;$('pav').style.backgroundImage='';$('pav').textContent=e;rdr();toast('头像已更新');}},setS:function(s){var us=Auth.users();var f=us.find(function(u){return u.username===App.user});if(f){f.status=s;Auth.saveUsers(us);rdr();toast('状态已更新');App.renderSidebar();Render.lb();}},addF:function(){var n=$('pfi').value.trim();if(!n){toast('请输入用户名');return}if(n===App.user){toast('不能添加自己');return}var us=Auth.users();if(!us.some(function(u){return u.username===n})){toast('用户不存在');return}var f=us.find(function(u){return u.username===App.user});if(!f.friends)f.friends=[];if(f.friends.indexOf(n)>=0){toast('已是好友');return}Inbox.add('friend_request',App.user,n,App.user+' 申请添加你为好友');$('pfi').value='';rdr();toast('好友申请已发送');},delF:function(n){var us=Auth.users();var f=us.find(function(u){return u.username===App.user});f.friends=(f.friends||[]).filter(function(x){return x!==n});Auth.saveUsers(us);rdr();}};function rdr(){var u=Auth.users().find(function(x){return x.username===App.user});if(!u)return;$('pun').textContent=u.username;if(u.avatar&&u.avatar.startsWith('data:')){$('pav').style.backgroundImage='url('+u.avatar+')';$('pav').style.backgroundSize='cover';$('pav').textContent='';}else{$('pav').style.backgroundImage='';$('pav').textContent=u.avatar||'👤';}$('pem').innerHTML=EM.map(function(e){return'<div class="emoji-opt'+(e===u.avatar?' sel':'')+'" onclick="TPR.setA(\''+e+'\')">'+e+'</div>';}).join('');$('pst').innerHTML=ST.map(function(s){return'<div class="st-btn st-btn'+(u.status===s.k?' '+s.c:'')+'" onclick="TPR.setS(\''+s.k+'\')">'+s.l+'</div>';}).join('');var fs=u.friends||[],us=Auth.users();$('pfl').innerHTML=fs.length===0?'<div style="color:var(--ts);font-size:13px;text-align:center;padding:10px">还没有好友</div>':fs.map(function(fn){var fu=us.find(function(x){return x.username===fn});var st=fu?(fu.status==='online'?'🟢':fu.status==='busy'?'🟡':'⚪'):'⚪';return'<div class="li"><div class="ct"><span style="font-size:20px;margin-right:8px">'+(fu&&fu.avatar&&fu.avatar.startsWith('data:')?'🖼':fu?fu.avatar||'👤':'👤')+'</span><span class="t">'+fn+' '+st+'</span></div><button class="btn btn-d btn-xs" onclick="TPR.delF(\''+fn+'\')">删除</button></div>';}).join('');}})();
(function(){Tools.register({id:'admin',name:'数据后台',icon:'🛠️',desc:'用户管理+诊断',html:'<p class="sect">🛠️ 数据后台</p><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px" id="as"></div><p style="font-size:15px;font-weight:600;margin-bottom:8px">👥 用户管理</p><div id="al"></div><p style="font-size:15px;font-weight:600;margin:16px 0 8px">🔍 系统诊断</p><div id="diag"></div><button class="btn btn-o btn-sm" onclick="TA.diag()" style="margin-top:8px">🔄 运行诊断</button><button class="btn btn-d btn-sm" onclick="TA.reset()" style="margin-top:8px;margin-left:8px">⚠ 重置数据</button>',onEnter:function(){Store.pullUsers().then(function(){rdr();TA.diag();});}});window.TA={delU:function(un){if(un===App.user){toast('不能删除自己');return}if(!confirm('确定删除 '+un+'？'))return;var us=Auth.users().filter(function(u){return u.username!==un});Auth.saveUsers(us);rdr();},reset:function(){if(!confirm('确定清除所有数据？此操作不可恢复！'))return;localStorage.clear();sessionStorage.clear();toast('已重置，即将刷新');setTimeout(function(){location.reload();},1000);},diag:async function(){var d=$('diag');d.innerHTML='<div class="li"><div class="ct"><div class="t">⏳ 正在检测...</div></div></div>';var results=await API.check();d.innerHTML=results.map(function(r){var cls=r.ok?'diag-ok':'diag-err';return'<div class="li"><div class="ct"><div class="t"><span class="'+cls+'">'+(r.ok?'✅':'❌')+'</span> '+r.name+'</div>'+(r.info?'<div class="st">'+r.info+'</div>':'')+(r.err?'<div class="st diag-err">'+r.err+'</div>':'')+'</div></div>';}).join('');}};function rdr(){var us=Auth.users();var on=us.filter(function(u){return u.status==='online'||u.status==='busy'}).length;$('as').innerHTML='<div class="stat-card"><div><div class="lbl">总用户</div><div class="val">'+us.length+'</div></div></div><div class="stat-card"><div><div class="lbl">在线</div><div class="val" style="color:var(--on)">'+on+'</div></div></div><div class="stat-card"><div><div class="lbl">离线</div><div class="val" style="color:var(--off)">'+(us.length-on)+'</div></div></div>';$('al').innerHTML=us.length===0?'<div class="empty"><span class="icon">👥</span>没有用户</div>':us.map(function(u){var sc=u.status==='online'?'var(--on)':u.status==='busy'?'var(--busy)':'var(--off)';return'<div class="li"><div class="ct"><span style="font-size:22px;margin-right:8px">'+(u.avatar&&u.avatar.startsWith('data:')?'🖼':u.avatar||'👤')+'</span><div><span class="t">'+H(u.username)+'</span><span style="margin-left:6px;color:'+sc+';font-size:12px">● '+(u.status||'offline')+'</span><div class="st">注册:'+u.createdAt+' | 最后:'+(u.lastSeen||'-')+'</div></div></div><button class="btn btn-d btn-xs" onclick="TA.delU(\''+u.username+'\')">删除</button></div>';}).join('');}})();
(function(){
Tools.register({id:'changelog',name:'更新公告',icon:'📋',desc:'',html:'<p class="sect">📋 更新公告 <span style="font-size:13px;color:var(--ts)">'+VERSION+'</span></p><div id="clog"></div>',onEnter:function(){rdr();}});
function rdr(){
  $('clog').innerHTML=CHANGELOG.map(function(c){return'<div class="rp-card" style="margin-bottom:12px"><h3>'+c.v+' <span style="font-size:12px;color:var(--ts)">'+c.date+'</span></h3><ul style="padding-left:20px;font-size:14px;color:var(--t)">'+c.items.map(function(i){return'<li style="margin:4px 0">'+i+'</li>'}).join('')+'</ul></div>';}).join('');
}})();
// Chat module
var Chat={with:null,open:function(f){Chat.with=f;$('chatFriendName').textContent=f;$('chatCard').style.display='flex';$('leaderboardCard').style.display='none';Chat.render();Chat.pull();},close:function(){Chat.with=null;$('chatCard').style.display='none';$('leaderboardCard').style.display='block';},render:function(){if(!Chat.with)return;var k='chat_'+[App.user,Chat.with].sort().join('_');var ms=JSON.parse(localStorage.getItem(k)||'[]');var c=$('chatMsgs');if(!ms.length){c.innerHTML='<div style="color:var(--ts);font-size:12px;text-align:center;padding:20px">暂无消息</div>';return;}c.innerHTML=ms.map(function(m){var im=m.from===App.user;return'<div style="margin-bottom:6px;text-align:'+(im?'right':'left')+'"><span style="font-size:10px;color:var(--ts)">'+(im?'我':m.from)+'</span><br><span style="display:inline-block;padding:6px 10px;border-radius:10px;font-size:13px;max-width:80%;word-break:break-word;'+(im?'background:var(--p);color:#fff':'background:#f1f5f9')+'">'+H(m.text)+'</span></div>';}).join('');c.scrollTop=c.scrollHeight;},send:function(){var t=$('chatInput').value.trim();if(!t||!Chat.with)return;var k='chat_'+[App.user,Chat.with].sort().join('_');var ms=JSON.parse(localStorage.getItem(k)||'[]');ms.push({from:App.user,to:Chat.with,text:t,time:new Date().toLocaleString('zh-CN')});localStorage.setItem(k,JSON.stringify(ms));$('chatInput').value='';Chat.render();API.upsert('toolbar_data','username=eq._chats&data_type=eq.'+encodeURIComponent(k),{username:'_chats',data_type:k,data_json:JSON.stringify(ms),updated_at:new Date().toISOString()}).catch(function(){});},pull:async function(){if(!Chat.with)return;var k='chat_'+[App.user,Chat.with].sort().join('_');try{var rows=await API.get('toolbar_data','username=eq._chats&data_type=eq.'+encodeURIComponent(k));if(rows.length&&rows[0].data_json){var cl=JSON.parse(rows[0].data_json);var lc=JSON.parse(localStorage.getItem(k)||'[]');if(cl.length>=lc.length){localStorage.setItem(k,JSON.stringify(cl));Chat.render();}}}catch(e){}}};

Auth.init();
</script>
