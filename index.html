<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>三队百宝箱</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<div class="login-screen" id="ls"><div class="login-box">
<h2 id="lt">&#x1F510; 登录</h2><p class="sub" id="lst">请输入账号密码</p>
<input type="text" id="lu" placeholder="用户名"/><input type="password" id="lp" placeholder="密码"/>
<input type="password" id="lp2" placeholder="确认密码（仅注册时需要）" style="display:none"/>
<button class="btn btn-p" onclick="Auth.login()" id="lb">登录</button>
<p class="err" id="le"></p>
<p style="margin-top:12px;font-size:13px;color:var(--ts)"><span id="ltg">没有账号？</span><a href="javascript:void(0)" onclick="Auth.toggle()" id="ltl" style="color:var(--p);text-decoration:none;font-weight:500">注册</a></p>
<p style="margin-top:16px;font-size:12px;color:var(--ts)"><a href="javascript:void(0)" onclick="if(confirm('确定清除所有数据？')){localStorage.clear();sessionStorage.clear();location.reload();}" style="color:var(--err);text-decoration:none">⚠ 忘记密码？重置全部数据</a></p>
</div></div>

<div class="app-shell" id="app">
<header class="topbar">
  <button class="btn-icon" id="menuBtn" onclick="App.toggleMenu()">&#x2630;</button>
  <button class="btn-icon hide" id="bb" onclick="Router.back()">&#x2039;</button>
  <h1 id="ht">三队百宝箱</h1>
  <button class="btn-icon" onclick="Router.go('inbox')" title="收件箱"><span class="badge" id="inboxBadge">0</span>&#x1F4E8;</button>
  <button class="btn-icon" id="av" onclick="Router.go('profile')">&#x1F464;</button>
  <button class="btn-icon" onclick="Router.go('admin')" title="数据后台" id="adBtn" style="display:none">&#x2699;&#xFE0F;</button>
  <button class="btn-icon" onclick="Auth.logout()">&#x1F6AA;</button>
</header>
<div class="menu-overlay" id="menuOverlay">
  <div onclick="App.toggleMenu();Router.go('home')">&#x1F3E0; 主页</div>
  <div onclick="App.toggleMenu();Router.go('inbox')">&#x1F4E8; 收件箱</div>
  <div onclick="App.toggleMenu();Router.go('profile')">&#x1F464; 个人中心</div>
  <div onclick="App.toggleMenu();Router.go('changelog')">&#x1F4CB; 更新公告</div>
  <div onclick="App.toggleMenu();App.quickStatus('online')">&#x1F7E2; 设为在线</div>
  <div onclick="App.toggleMenu();App.quickStatus('busy')">&#x1F7E1; 设为忙碌</div>
  <div onclick="App.toggleMenu();App.quickStatus('offline')">&#x26AA; 设为隐身</div>
</div>

<div class="body-wrap">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-card"><h3>👥 好友</h3><div id="sidebarFriends"></div></div>
  </div>
  <div class="main-area" id="mainArea">
    <div class="toast" id="toast"></div>
    <div class="page active" id="pageHome"><div class="home-grid" id="homeGrid"></div><div id="mobileLB" style="display:none"></div></div>
  </div>
  <div class="right-panel" id="rightPanel">
    <div class="rp-card"><h3>🏆 在线排行榜</h3><div id="lbList"></div></div>
  </div>
</div>
</div>

<script src="js/core.js"></script>
<script src="js/rotation.js"></script>
<script src="js/biztrip.js"></script>
<script src="js/wheel.js"></script>
<script src="js/draw.js"></script>
<script src="js/memo.js"></script>
<script src="js/poll.js"></script>
<script src="js/inbox.js"></script>
<script src="js/feedback.js"></script>
<script src="js/profile.js"></script>
<script src="js/admin.js"></script>
<script src="js/changelog.js"></script>
<script src="js/boot.js"></script>
</body>
</html>
